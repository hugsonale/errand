name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/errand-backend

jobs:

  # ─── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Run backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: errand_user
          POSTGRES_PASSWORD: errand_pass
          POSTGRES_DB: errand_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==1.8.2

      - name: Install dependencies
        working-directory: ./backend
        run: poetry install --no-interaction

      - name: Create test environment
        working-directory: ./backend
        run: |
          cat > .env << EOF
          APP_ENV=test
          DEBUG=true
          SECRET_KEY=test-secret-key-minimum-32-characters-long
          DATABASE_URL=postgresql+asyncpg://errand_user:errand_pass@localhost:5432/errand_test
          DATABASE_URL_SYNC=postgresql://errand_user:errand_pass@localhost:5432/errand_test
          REDIS_URL=redis://localhost:6379/0
          AWS_ACCESS_KEY_ID=
          AWS_SECRET_ACCESS_KEY=
          TERMII_API_KEY=
          PAYSTACK_SECRET_KEY=
          FIREBASE_CREDENTIALS_PATH=
          FIRST_ADMIN_EMAIL=admin@test.com
          FIRST_ADMIN_PASSWORD=TestAdmin123!
          ALLOWED_ORIGINS=http://localhost:3000
          EOF

      - name: Run linting
        working-directory: ./backend
        run: poetry run ruff check app/

      - name: Run tests with coverage
        working-directory: ./backend
        run: |
          poetry run pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60
        env:
          DATABASE_URL: postgresql+asyncpg://errand_user:errand_pass@localhost:5432/errand_test
          DATABASE_URL_SYNC: postgresql://errand_user:errand_pass@localhost:5432/errand_test

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./backend/coverage.xml
          fail_ci_if_error: false

  # ─── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/errand-marketplace

            # Pull latest image
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}/errand-backend:latest

            # Zero-downtime restart
            docker-compose -f docker-compose.prod.yml up -d --no-deps --build backend

            # Run migrations
            docker-compose -f docker-compose.prod.yml exec -T backend alembic upgrade head

            # Health check
            sleep 10
            curl -f http://localhost/health || exit 1

            # Clean up old images
            docker image prune -f

            echo "✅ Deployment successful"

      - name: Notify on failure
        if: failure()
        run: |
          echo "🚨 Deployment failed on $(date)"
          # Add Slack/email notification here
