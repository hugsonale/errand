version: "3.9"

services:

  nginx:
    image: nginx:1.25-alpine
    container_name: errand_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - errand_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: errand-backend:latest
    container_name: errand_backend
    restart: always
    env_file:
      - /etc/errand/.env
    environment:
      APP_ENV: production
      DEBUG: "false"
    expose:
      - "8000"
    volumes:
      - app_logs:/app/logs
    networks:
      - errand_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    command: >
      sh -c "
        alembic upgrade head &&
        gunicorn app.main:app
          --workers 4
          --worker-class uvicorn.workers.UvicornWorker
          --bind 0.0.0.0:8000
          --timeout 120
          --keepalive 5
          --max-requests 1000
          --max-requests-jitter 100
          --access-logfile -
          --error-logfile -
          --log-level warning
      "

  redis:
    image: redis:7-alpine
    container_name: errand_redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - errand_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  certbot:
    image: certbot/certbot:latest
    container_name: errand_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - errand_network

volumes:
  redis_data:
  nginx_logs:
  app_logs:

networks:
  errand_network:
    driver: bridge
