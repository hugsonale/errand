name: errand_marketplace
description: Verified Errand Marketplace — Trusted human assistance for Africa
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.1.4

  # HTTP
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Local storage
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  pinput: ^4.0.0          # OTP input
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Maps & location
  google_maps_flutter: ^2.6.1
  geolocator: ^11.1.0

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  url_launcher: ^6.3.0
  fluttertoast: ^8.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
